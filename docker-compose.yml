services:
  postgres:
    image: postgres:16-alpine
    container_name: dbweb-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: demo_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d demo_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dbweb-backend
    ports:
      - "8000:8000"
    environment:
      ENCRYPTION_KEY: ""
      CORS_ORIGINS: "http://localhost:5173,http://localhost:3000"
      WATCHFILES_FORCE_POLLING: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/.venv

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dbweb-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_PROXY_TARGET: "http://backend:8000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
